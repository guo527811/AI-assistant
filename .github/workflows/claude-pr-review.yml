name: Claude Code PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # 只在 PR 事件触发，或评论中包含 /claude-review 时触发
    if: github.event_name == 'pull_request' || contains(github.event.comment.body, '/claude-review')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude Code PR Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_MODEL: deepseek-v4-pro
        run: |
          claude --print "Review this PR diff. Focus on:
          1. 🔴 Bugs & logic errors
          2. 🟡 Security vulnerabilities
          3. 🟢 Code simplification & reuse opportunities
          4. 📝 Missing tests or documentation

          Format your response as a concise PR review with suggestions."
